<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="55%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="60%" r="55%">
      <stop offset="0%" stop-color="#7f1d1d" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7f1d1d" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#sky)"/>
  <rect width="1920" height="1080" fill="url(#glow)"/>
  <!-- silhouette de caserne -->
  <g fill="#0b1220" opacity="0.9">
    <rect x="0" y="720" width="1920" height="360"/>
    <rect x="120" y="560" width="520" height="200"/>
    <rect x="700" y="500" width="380" height="260"/>
    <rect x="1140" y="590" width="640" height="180"/>
  </g>
  <!-- portes de garage -->
  <g fill="#111827" stroke="#1f2937" stroke-width="4">
    <rect x="160" y="600" width="120" height="160"/>
    <rect x="320" y="600" width="120" height="160"/>
    <rect x="480" y="600" width="120" height="160"/>
  </g>
  <!-- emblème filigrane -->
  <g transform="translate(960 400)" opacity="0.08" fill="#f8fafc">
    <circle r="150" fill="none" stroke="#f8fafc" stroke-width="10"/>
    <path d="M0 -110 L28 -30 L112 -30 L44 18 L70 100 L0 52 L-70 100 L-44 18 L-112 -30 L-28 -30 Z"/>
  </g>
</svg>
